<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #2D2A24; }
      .subtitle { font-size: 12px; fill: #6B6558; }
      .label { font-size: 11px; fill: #2D2A24; font-weight: 600; }
      .label-sm { font-size: 9px; fill: #6B6558; }
      .time { font-size: 10px; fill: #9A7A2E; font-weight: 700; font-family: 'Courier New', monospace; }
      .city-dot { fill: #4A6A9A; }
      .city-label { font-size: 10px; fill: #4A6A9A; font-weight: 600; }
      .route { stroke: #B04A4A; stroke-width: 2.5; fill: none; stroke-dasharray: 8,4; opacity: 0.85; }
      .route-glow { stroke: #B04A4A; stroke-width: 6; fill: none; opacity: 0.15; }
      .event-marker { fill: #9A7A2E; }
      .event2-marker { fill: #B86A2E; }
      .range-fill { fill: #D4C9A8; opacity: 0.3; stroke: #B86A2E; stroke-width: 1; stroke-dasharray: 4,3; }
      .highway { stroke: #A09880; stroke-width: 1.5; fill: none; }
      .highway-label { font-size: 8px; fill: #A09880; font-weight: 600; }
      .state-border { stroke: #C8C0B0; stroke-width: 1; fill: none; stroke-dasharray: 6,3; }
      .legend-box { fill: #F6F5F1; stroke: #D4C9A8; stroke-width: 1; rx: 4; }
      .note { font-size: 9px; fill: #6B6558; font-style: italic; }
      .arrow { fill: #B04A4A; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrow"/>
    </marker>
    <!-- V-formation symbol -->
    <symbol id="v-formation" viewBox="0 0 20 16">
      <circle cx="10" cy="2" r="1.5" fill="#B04A4A"/>
      <circle cx="7" cy="6" r="1.5" fill="#B04A4A"/>
      <circle cx="13" cy="6" r="1.5" fill="#B04A4A"/>
      <circle cx="4" cy="10" r="1.5" fill="#B04A4A"/>
      <circle cx="16" cy="10" r="1.5" fill="#B04A4A"/>
      <line x1="10" y1="2" x2="4" y2="10" stroke="#B04A4A" stroke-width="0.8" opacity="0.5"/>
      <line x1="10" y1="2" x2="16" y2="10" stroke="#B04A4A" stroke-width="0.8" opacity="0.5"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="#F6F5F1"/>

  <!-- Border -->
  <rect x="10" y="10" width="780" height="880" fill="none" stroke="#D4C9A8" stroke-width="1" rx="4"/>

  <!-- Title block -->
  <text x="40" y="48" class="title">PHOENIX LIGHTS — V-FORMATION TRANSIT PATH</text>
  <text x="40" y="66" class="subtitle">March 13, 1997 · Event 1: 7:55 PM – 8:45 PM MST · Henderson, NV → Tucson, AZ</text>
  <text x="40" y="82" class="subtitle">Reconstructed from 700+ witness reports · ~300 miles in ~50 minutes (~360 mph)</text>

  <!-- Arizona/Nevada state outline (simplified) -->
  <!-- Nevada border (partial) -->
  <path d="M 140,130 L 140,380 L 220,520" class="state-border"/>
  <text x="120" y="200" class="label-sm" transform="rotate(-90,120,200)">NEVADA</text>

  <!-- Arizona outline (simplified polygon) -->
  <path d="M 140,380 L 220,520 L 220,800 L 720,800 L 720,130 L 500,130 L 350,130 L 140,130 L 140,380"
        fill="none" stroke="#C8C0B0" stroke-width="1.5"/>
  <text x="500" y="470" font-size="28" fill="#E8E2D6" font-weight="700" letter-spacing="12">ARIZONA</text>

  <!-- Barry Goldwater Range (southwestern AZ) -->
  <path d="M 220,620 L 420,620 L 420,780 L 220,780 Z" class="range-fill"/>
  <text x="320" y="700" font-size="9" fill="#B86A2E" text-anchor="middle" font-weight="600">BARRY GOLDWATER</text>
  <text x="320" y="712" font-size="9" fill="#B86A2E" text-anchor="middle" font-weight="600">AIR FORCE RANGE</text>
  <text x="320" y="726" font-size="8" fill="#B86A2E" text-anchor="middle" opacity="0.7">Operation Snowbird</text>
  <text x="320" y="738" font-size="8" fill="#B86A2E" text-anchor="middle" opacity="0.7">A-10 flare training area</text>

  <!-- Major highways -->
  <!-- I-17 (Phoenix to Prescott direction, N-S) -->
  <path d="M 430,130 L 430,350 L 440,550 L 445,750" class="highway"/>
  <text x="448" y="250" class="highway-label">I-17</text>

  <!-- I-10 (E-W through Phoenix) -->
  <path d="M 220,540 L 400,530 L 550,530 L 720,545" class="highway"/>
  <text x="620" y="525" class="highway-label">I-10</text>

  <!-- I-40 (E-W northern AZ) -->
  <path d="M 140,250 L 400,240 L 720,235" class="highway"/>
  <text x="600" y="228" class="highway-label">I-40</text>

  <!-- Cities -->
  <!-- Henderson/Las Vegas NV -->
  <circle cx="180" cy="170" r="5" class="city-dot"/>
  <text x="192" y="168" class="city-label">Henderson, NV</text>
  <text x="192" y="180" class="label-sm">(Las Vegas area)</text>

  <!-- Prescott -->
  <circle cx="340" cy="330" r="4" class="city-dot"/>
  <text x="352" y="334" class="city-label">Prescott</text>

  <!-- Dewey -->
  <circle cx="370" cy="355" r="3" class="city-dot"/>
  <text x="382" y="359" class="city-label">Dewey</text>

  <!-- Phoenix metro -->
  <circle cx="440" cy="510" r="7" class="city-dot" opacity="0.3"/>
  <circle cx="440" cy="510" r="4" class="city-dot"/>
  <text x="456" y="505" class="city-label">Phoenix</text>
  <text x="456" y="517" class="label-sm">metro area</text>

  <!-- Scottsdale -->
  <circle cx="490" cy="490" r="3" class="city-dot"/>
  <text x="502" y="494" class="city-label">Scottsdale</text>

  <!-- Tempe/Chandler -->
  <circle cx="470" cy="555" r="3" class="city-dot"/>
  <text x="482" y="559" class="city-label">Tempe</text>

  <!-- Glendale -->
  <circle cx="410" cy="495" r="3" class="city-dot"/>
  <text x="380" y="488" class="city-label">Glendale</text>

  <!-- Tucson -->
  <circle cx="500" cy="730" r="5" class="city-dot"/>
  <text x="514" y="734" class="city-label">Tucson</text>

  <!-- Kingman -->
  <circle cx="220" cy="260" r="3" class="city-dot"/>
  <text x="232" y="264" class="city-label">Kingman</text>

  <!-- Flagstaff -->
  <circle cx="420" cy="195" r="4" class="city-dot"/>
  <text x="434" y="199" class="city-label">Flagstaff</text>

  <!-- ============================================ -->
  <!-- EVENT 1: V-Formation Transit Path -->
  <!-- ============================================ -->

  <!-- Route glow (background) -->
  <path d="M 180,170 C 220,220 280,280 340,330 C 370,355 400,400 430,460 C 445,490 445,520 450,570 C 460,630 480,680 500,730"
        class="route-glow"/>

  <!-- Route line -->
  <path d="M 180,170 C 220,220 280,280 340,330 C 370,355 400,400 430,460 C 445,490 445,520 450,570 C 460,630 480,680 500,730"
        class="route" marker-end="url(#arrowhead)"/>

  <!-- Sighting markers along route with timestamps -->

  <!-- Sighting 1: Henderson NV -->
  <use href="#v-formation" x="160" y="135" width="20" height="16"/>
  <rect x="200" y="130" width="120" height="32" rx="3" fill="#FFFDF5" stroke="#9A7A2E" stroke-width="1"/>
  <text x="210" y="145" class="time">19:55 MST</text>
  <text x="210" y="157" class="label-sm">First sighting — Henderson</text>

  <!-- Sighting 2: Prescott area -->
  <use href="#v-formation" x="310" y="300" width="20" height="16"/>
  <rect x="250" y="290" width="135" height="32" rx="3" fill="#FFFDF5" stroke="#9A7A2E" stroke-width="1"/>
  <text x="260" y="305" class="time">~20:15 MST</text>
  <text x="260" y="317" class="label-sm">Prescott — multiple witnesses</text>

  <!-- Sighting 3: Dewey -->
  <use href="#v-formation" x="355" y="370" width="20" height="16"/>
  <rect x="390" y="368" width="160" height="32" rx="3" fill="#FFFDF5" stroke="#9A7A2E" stroke-width="1"/>
  <text x="400" y="383" class="time">~20:17 MST</text>
  <text x="400" y="395" class="label-sm">Dewey — Tim Ley family sighting</text>

  <!-- Sighting 4: North Phoenix -->
  <use href="#v-formation" x="420" y="435" width="20" height="16"/>
  <rect x="460" y="430" width="175" height="44" rx="3" fill="#FFFDF5" stroke="#9A7A2E" stroke-width="1"/>
  <text x="470" y="445" class="time">~20:28 MST</text>
  <text x="470" y="457" class="label-sm">Phoenix — Gov. Symington sees</text>
  <text x="470" y="469" class="label-sm">formation from Squaw Peak area</text>

  <!-- Sighting 5: Over Phoenix -->
  <use href="#v-formation" x="430" y="505" width="20" height="16"/>
  <rect x="500" y="540" width="175" height="44" rx="3" fill="#FFFDF5" stroke="#9A7A2E" stroke-width="1"/>
  <text x="510" y="555" class="time">~20:30 MST</text>
  <text x="510" y="567" class="label-sm">Hundreds of Phoenix residents</text>
  <text x="510" y="579" class="label-sm">see silent V pass overhead</text>

  <!-- Sighting 6: South toward Tucson -->
  <use href="#v-formation" x="470" y="655" width="20" height="16"/>
  <rect x="510" y="650" width="145" height="32" rx="3" fill="#FFFDF5" stroke="#9A7A2E" stroke-width="1"/>
  <text x="520" y="665" class="time">~20:45 MST</text>
  <text x="520" y="677" class="label-sm">Last sighted near Tucson</text>

  <!-- ============================================ -->
  <!-- EVENT 2: Stationary Lights (separate) -->
  <!-- ============================================ -->

  <!-- Event 2 area indicator -->
  <rect x="300" y="580" width="120" height="30" rx="3" fill="#FFFDF5" stroke="#B86A2E" stroke-width="1.5"/>
  <circle cx="310" cy="595" r="4" class="event2-marker"/>
  <text x="320" y="599" font-size="9" fill="#B86A2E" font-weight="600">EVENT 2 · 22:00</text>

  <!-- Dotted line to Event 2 note -->
  <line x1="360" y1="610" x2="360" y2="640" stroke="#B86A2E" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="260" y="640" width="200" height="40" rx="3" fill="#FFF8EE" stroke="#B86A2E" stroke-width="1"/>
  <text x="270" y="655" font-size="9" fill="#B86A2E" font-weight="600">Stationary lights over SW Phoenix</text>
  <text x="270" y="668" font-size="8" fill="#B86A2E">Likely Maryland ANG flares over</text>
  <text x="270" y="678" font-size="8" fill="#B86A2E">Goldwater Range (Krzyston video)</text>

  <!-- ============================================ -->
  <!-- Legend -->
  <!-- ============================================ -->
  <rect x="30" y="810" width="740" height="70" class="legend-box"/>

  <text x="50" y="832" class="label">LEGEND</text>

  <!-- V-formation symbol -->
  <use href="#v-formation" x="50" y="840" width="16" height="13"/>
  <text x="72" y="851" class="label-sm">V-formation sighting location</text>

  <!-- Route line -->
  <line x1="170" y1="848" x2="210" y2="848" class="route"/>
  <text x="218" y="851" class="label-sm">Reconstructed flight path (Event 1)</text>

  <!-- Event 2 marker -->
  <circle cx="390" cy="848" r="4" class="event2-marker"/>
  <text x="400" y="851" class="label-sm">Event 2 location (stationary lights)</text>

  <!-- Range area -->
  <rect x="540" y="841" width="14" height="14" class="range-fill"/>
  <text x="560" y="851" class="label-sm">Military range / training area</text>

  <!-- Attribution -->
  <text x="50" y="870" class="note">Map: The Meridian Project · Original reconstruction from witness testimony and NUFORC reports · Not to precise geographic scale</text>

  <!-- Compass rose (simple) -->
  <g transform="translate(720,160)">
    <circle cx="0" cy="0" r="20" fill="#FFFDF5" stroke="#D4C9A8" stroke-width="1"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#2D2A24" stroke-width="1"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#2D2A24" stroke-width="1"/>
    <text x="0" y="-8" text-anchor="middle" font-size="10" font-weight="700" fill="#2D2A24">N</text>
    <polygon points="0,-16 -3,-10 3,-10" fill="#2D2A24"/>
  </g>
</svg>