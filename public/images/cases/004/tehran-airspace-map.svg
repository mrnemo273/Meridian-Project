<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #2D2A24; }
      .subtitle { font-size: 11px; fill: #6B6558; }
      .label { font-size: 11px; fill: #2D2A24; font-weight: 600; }
      .label-sm { font-size: 9px; fill: #6B6558; }
      .time { font-size: 10px; fill: #9A7A2E; font-weight: 700; font-family: 'Courier New', monospace; }
      .land { fill: #E8E2D6; stroke: #C8C0B0; stroke-width: 1; }
      .city-area { fill: #D6DFE8; stroke: #4A6A9A; stroke-width: 1.5; }
      .intercept-route { stroke: #B04A4A; stroke-width: 2; fill: none; stroke-dasharray: 6,3; }
      .intercept-glow { stroke: #B04A4A; stroke-width: 5; fill: none; opacity: 0.15; }
      .uap-marker { fill: #9A7A2E; }
      .uap-glow { fill: #9A7A2E; fill-opacity: 0.15; }
      .secondary-obj { fill: #B04A4A; }
      .legend-box { fill: #F6F5F1; stroke: #D4C9A8; stroke-width: 1; rx: 4; }
      .note { font-size: 8px; fill: #6B6558; font-style: italic; }
      .city-dot { fill: #6B6558; }
      .mountain { fill: #C8C0B0; stroke: #A09888; stroke-width: 0.5; }
    </style>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#B04A4A"/>
    </marker>
    <marker id="arrow-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9A7A2E"/>
    </marker>
    <symbol id="f4" viewBox="0 0 24 20">
      <path d="M12,2 L14,8 L22,10 L14,12 L12,18 L10,12 L2,10 L10,8 Z" fill="#4A6A9A" stroke="#2D2A24" stroke-width="0.5"/>
    </symbol>
    <symbol id="uap-bright" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="6" fill="#9A7A2E" opacity="0.9"/>
      <circle cx="12" cy="12" r="10" fill="none" stroke="#9A7A2E" stroke-width="1" opacity="0.4"/>
      <circle cx="12" cy="12" r="14" fill="none" stroke="#9A7A2E" stroke-width="0.5" opacity="0.2"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#F6F5F1"/>
  <rect x="8" y="8" width="944" height="524" fill="none" stroke="#D4C9A8" stroke-width="1" rx="4"/>

  <!-- Title area (compact) -->
  <text x="30" y="34" class="title">TEHRAN F-4 INTERCEPT</text>
  <text x="30" y="50" class="subtitle">September 19, 1976 · ~01:30 local · Imperial Iranian Air Force · Two F-4 Phantom IIs scrambled · Weapons and comms disabled · DIA report filed</text>

  <!-- Map area -->
  <rect x="16" y="62" width="928" height="390" fill="#E8E2D6" rx="3"/>

  <!-- Alborz Mountains (north, wider) -->
  <path d="M 16,62 L 944,62 L 944,150 C 860,175 780,185 700,178 C 620,172 540,162 460,168 C 380,174 300,185 220,178 C 140,172 80,162 16,155 Z" class="mountain"/>
  <text x="480" y="120" font-size="12" fill="#8A8070" text-anchor="middle" letter-spacing="8" font-style="italic">ALBORZ MOUNTAINS</text>

  <!-- Tehran city area -->
  <ellipse cx="480" cy="270" rx="160" ry="90" class="city-area"/>
  <text x="480" y="245" font-size="16" fill="#4A6A9A" text-anchor="middle" font-weight="700" letter-spacing="4">TEHRAN</text>
  <text x="480" y="260" font-size="9" fill="#4A6A9A" text-anchor="middle">Population ~4.5 million (1976)</text>

  <!-- Mehrabad Airport -->
  <rect x="410" y="295" width="36" height="7" rx="2" fill="#6B6558"/>
  <text x="428" y="314" font-size="8" fill="#6B6558" text-anchor="middle" font-weight="600">Mehrabad Airport</text>

  <!-- Shahrokhi AFB -->
  <rect x="100" y="370" width="50" height="10" rx="2" fill="#4A6A9A"/>
  <text x="125" y="392" font-size="9" fill="#4A6A9A" text-anchor="middle" font-weight="600">Shahrokhi AFB</text>
  <text x="125" y="402" font-size="7" fill="#6B6558" text-anchor="middle">F-4 Phantom base</text>

  <!-- UAP position -->
  <use href="#uap-bright" x="620" y="165" width="36" height="36"/>
  <circle cx="638" cy="183" r="26" class="uap-glow"/>
  <text x="672" y="178" font-size="10" fill="#9A7A2E" font-weight="600">Primary Object</text>
  <text x="672" y="190" font-size="8" fill="#9A7A2E">"Very bright, colored strobes"</text>

  <!-- First F-4 route -->
  <path d="M 125,375 C 190,340 300,290 400,250 C 440,235 520,215 590,200" class="intercept-glow"/>
  <path d="M 125,375 C 190,340 300,290 400,250 C 440,235 520,215 590,200" class="intercept-route" marker-end="url(#arrow-red)"/>
  <use href="#f4" x="440" y="232" width="18" height="14"/>

  <!-- First F-4 callout -->
  <rect x="30" y="200" width="200" height="55" rx="3" fill="#FFFDF5" stroke="#B04A4A" stroke-width="1"/>
  <text x="40" y="215" class="time">~01:30 · FIRST F-4</text>
  <text x="40" y="226" class="label-sm">On approach: all instruments fail</text>
  <text x="40" y="237" class="label-sm">Communications go dead</text>
  <text x="40" y="248" class="label-sm">Pilot breaks off, returns to base</text>
  <line x1="230" y1="228" x2="440" y2="240" stroke="#B04A4A" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Second F-4 route -->
  <path d="M 125,375 C 170,350 260,310 380,260 C 450,235 550,210 620,195" class="intercept-glow"/>
  <path d="M 125,375 C 170,350 260,310 380,260 C 450,235 550,210 620,195" stroke="#4A6A9A" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <use href="#f4" x="500" y="218" width="18" height="14"/>

  <!-- Second F-4 callout -->
  <rect x="730" y="210" width="210" height="78" rx="3" fill="#FFFDF5" stroke="#4A6A9A" stroke-width="1"/>
  <text x="740" y="225" class="time">~01:40 · LT. JAFARI (2ND F-4)</text>
  <text x="740" y="237" class="label-sm">Closes to weapons range</text>
  <text x="740" y="248" class="label-sm">Attempts AIM-9 launch → panel dead</text>
  <text x="740" y="259" class="label-sm">Communications fail simultaneously</text>
  <text x="740" y="273" class="label-sm">Secondary object emerges, flies at F-4</text>
  <text x="740" y="284" class="label-sm">Jafari executes evasive dive</text>

  <!-- Secondary object path -->
  <circle cx="638" cy="200" r="5" class="secondary-obj"/>
  <path d="M 638,200 C 615,210 590,218 555,222" stroke="#B04A4A" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>
  <text x="545" y="218" font-size="8" fill="#B04A4A" text-anchor="end">Secondary object</text>
  <text x="545" y="228" font-size="7" fill="#B04A4A" text-anchor="end">flies toward F-4</text>

  <!-- Secondary object descends -->
  <circle cx="590" cy="360" r="4" class="secondary-obj" opacity="0.6"/>
  <path d="M 640,205 C 640,250 620,310 590,360" stroke="#B04A4A" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="605" y="375" font-size="8" fill="#B04A4A">Object descends to ground</text>
  <text x="605" y="386" font-size="7" fill="#B04A4A">Radiation readings found next day</text>

  <!-- Jafari evasive dive -->
  <path d="M 555,225 C 540,270 520,300 490,330" stroke="#4A6A9A" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="475" y="342" font-size="8" fill="#4A6A9A" text-anchor="end">Jafari evasive dive</text>

  <!-- Gen. Yousefi callout -->
  <rect x="30" y="280" width="190" height="40" rx="3" fill="#FFFDF5" stroke="#6B6558" stroke-width="1"/>
  <text x="40" y="295" class="label">Gen. Yousefi</text>
  <text x="40" y="306" class="label-sm">Commanding general — first notified</text>
  <text x="40" y="316" class="label-sm">of bright light over Tehran</text>

  <!-- Compass -->
  <circle cx="900" cy="420" r="22" fill="none" stroke="#C8C0B0" stroke-width="1"/>
  <text x="900" y="408" font-size="11" fill="#6B6558" text-anchor="middle" font-weight="700">N</text>
  <line x1="900" y1="412" x2="900" y2="403" stroke="#6B6558" stroke-width="2"/>

  <!-- Legend (compact, bottom) -->
  <rect x="16" y="460" width="928" height="68" class="legend-box"/>
  <text x="36" y="478" class="label">Legend</text>

  <use href="#f4" x="32" y="486" width="16" height="14"/>
  <text x="54" y="498" class="label-sm">F-4 Phantom II (IIAF)</text>

  <use href="#uap-bright" x="165" y="485" width="16" height="16"/>
  <text x="187" y="498" class="label-sm">Primary object</text>

  <circle cx="275" cy="494" r="4" class="secondary-obj"/>
  <text x="285" y="498" class="label-sm">Secondary object</text>

  <line x1="380" y1="494" x2="410" y2="494" stroke="#B04A4A" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="418" y="498" class="label-sm">Intercept route</text>

  <line x1="510" y1="494" x2="540" y2="494" stroke="#4A6A9A" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="548" y="498" class="label-sm">Second F-4 route</text>

  <text x="36" y="518" class="note">Sources: DIA report (Sept. 19, 1976, declassified) · Lt. Parviz Jafari National Press Club testimony (2007)</text>
  <text x="36" y="527" class="note">DIA Assessment: "This case is a classic which meets all the criteria necessary for a valid study of the UFO phenomenon."</text>
</svg>
